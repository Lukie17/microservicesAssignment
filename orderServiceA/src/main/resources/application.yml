server:
  port: 8081

spring:
  application:
    name: orderServiceA

  config:
    import: optional:configserver:http://localhost:8071

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka