server:
  port: 8083

spring:
  application:
    name: orderservicea

  config:
    import: optional:configserver:http://localhost:8071

  datasource:
    url: jdbc:h2:mem:orders-db
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true