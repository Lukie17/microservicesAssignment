server:
  port: 8082

spring:
  application:
    name: bookserviceb

  config:
    import: optional:configserver:http://localhost:8071

  datasource:
    url: jdbc:h2:mem:books-db
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka